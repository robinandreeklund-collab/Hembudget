; PgBouncer-config för Hembudget på Cloud Run.
;
; Roll: connection-multiplexer mellan FastAPI-app och Cloud SQL Postgres.
; Utan PgBouncer skapar varje Cloud Run-instans 20-30 server-connections,
; och Cloud SQL db-f1-micro:s 25-conn-cap sprängs vid 1+ instans.
;
; Med PgBouncer: appen får N "billiga" client-connections via TCP localhost:
; 6432 medan PgBouncer håller en LITEN pool av server-connections mot
; Cloud SQL. 5 app-instanser * 5 client-conn = 25 client-conn, men
; bara ~8 server-conn behövs eftersom de multiplexas.
;
; pool_mode=transaction: returnerar server-connection till poolen efter
; varje transaktion (vs varje session). Snabbast, men kräver att appen
; INTE använder session-state (SET LOCAL, prepared statements som
; persisterar, advisory locks etc.). SQLAlchemy + psycopg2 i vårt
; setup gör inte det → fritt fram.

[databases]
; Faktiska Cloud SQL-anslutningen läses dynamiskt från env-vars i
; entrypoint.sh som genererar en kopia av denna config med lösen-/host-
; värden injicerade. Här är bara mönstret/template.
hembudget = host=__DB_HOST__ port=__DB_PORT__ dbname=__DB_NAME__ user=__DB_USER__ password=__DB_PASSWORD__ pool_size=8

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432
auth_type = trust
auth_file = /tmp/pgbouncer-userlist.txt
; Unix socket-dir + pidfile måste vara skrivbara av 'nobody' (vi
; släpper privilegier via -u nobody i entrypoint för att undvika
; 'FATAL PgBouncer should not run as root'). /var/run/pgbouncer
; chownas till nobody:nogroup i Dockerfile. Default /var/run/postgresql/
; finns inte i python:3.11-slim → pgbouncer kraschar vid bind.
unix_socket_dir = /var/run/pgbouncer
pidfile = /var/run/pgbouncer/pgbouncer.pid

; Connection-pool · default_pool_size = max server-conn per (db, user).
; 8 default · 5 inst × 8 = 40 conn vid full last. Under deploy
; (revisions-overlap) kortvarigt 80. Cloud SQL db-custom-1-3840 har
; 100 cap, vilket ger headroom. Override via PGBOUNCER_POOL_SIZE-env.
default_pool_size = 8
; min_pool_size = 0 så idle revisioner inte håller server-conn under
; deploy-overlap. Tidigare 2 betydde 5 × 2 = 10 conn alltid hållna
; per revision = 20 conn under överlapp innan första query.
min_pool_size = 0
reserve_pool_size = 2
reserve_pool_timeout = 3

; Max client-connections totalt (alla instanser tillsammans).
; Hög siffra · client-side conn är "gratis" för PgBouncer.
max_client_conn = 200

; Transaction pooling · returnerar server till pool efter varje COMMIT.
; Måste matchas av app-side SQLAlchemy: ingen prepared-statement-cache
; över transaktioner, ingen SET LOCAL.
pool_mode = transaction

; Server-side · stäng idle server-connections efter 10 min så Cloud SQL
; inte byggs upp med stale.
server_idle_timeout = 600
server_lifetime = 3600

; Query-timeouts · matchar app-side pool_timeout=15s och vår 30s
; FastAPI-default. Långsamma queries indikerar app-bugg, inte PgBouncer-
; problem.
query_wait_timeout = 30
query_timeout = 60

; Loggning · default INFO är lite snackigt, sänk till WARNING i prod.
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; Stats för debugging via "show pools" mot localhost:6432 (skipping for now)
admin_users = pgbadmin
stats_period = 60
