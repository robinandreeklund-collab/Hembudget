<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pentagonen · Elev · Vol. 07</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../_shared.css">
<style>
:root {
  --bg-deep: #0a0e1a;
  --bg-mid: #0f1525;
  --warm: #fbbf24;
  --warm-soft: #f59e0b;
  --line: rgba(255,255,255,0.1);
  --line-strong: rgba(255,255,255,0.18);
  --text: rgba(255,255,255,0.92);
  --text-mid: rgba(255,255,255,0.6);
  --text-dim: rgba(255,255,255,0.4);
}

body {
  background: var(--bg-deep);
  color: var(--text);
  position: relative;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: ""; position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 50% at 25% 35%, rgba(220,76,43,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 55% 40% at 78% 25%, rgba(251,191,36,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 70% 80%, rgba(99,102,241,0.08) 0%, transparent 60%),
    linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 60%, var(--bg-deep) 100%);
  animation: drift 28s ease-in-out infinite alternate;
}
@keyframes drift {
  0%   { transform: translate(0,0) scale(1); }
  100% { transform: translate(-1.8%, 1.2%) scale(1.04); }
}
body::after {
  content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(0deg, transparent 49.5%, rgba(255,255,255,0.022) 50%, transparent 50.5%),
    linear-gradient(90deg, transparent 49.5%, rgba(255,255,255,0.022) 50%, transparent 50.5%);
  background-size: 96px 96px;
  mask-image: radial-gradient(ellipse 70% 60% at center, black 0%, transparent 80%);
  opacity: 0.6;
}

/* === TOPBAR === */
.topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 56px; z-index: 80;
  background: rgba(10,14,26,0.88);
  backdrop-filter: blur(14px) saturate(140%);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center;
  padding: 0 22px; gap: 22px;
}
.tb-brand {
  font-family: var(--serif); font-weight: 700; font-size: 16px;
  color: #fff; text-decoration: none;
  display: flex; align-items: center; gap: 9px;
}
.tb-brand::before { content: "●"; color: var(--accent); font-size: 11px; }
.tb-brand-meta {
  font-family: var(--mono); font-size: 9.5px;
  letter-spacing: 1.6px; text-transform: uppercase; color: var(--text-dim);
  margin-left: 4px;
}
.tb-crumbs {
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 1.4px; color: var(--text-dim);
  text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.tb-crumbs a {
  color: var(--text-dim); text-decoration: none;
  border-bottom: 1px dotted transparent;
  cursor: pointer;
}
.tb-crumbs a:hover { color: var(--warm); border-bottom-color: var(--warm); }
.tb-crumbs strong { color: #fff; font-weight: 700; }
.tb-crumbs .sep { color: rgba(255,255,255,0.25); }
.tb-spacer { flex: 1; }
.tb-meter {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 10px;
  letter-spacing: 0.6px; color: var(--text-mid);
}
.tb-meter-bar { width: 80px; height: 5px; background: rgba(255,255,255,0.08); border-radius: 100px; overflow: hidden; position: relative; }
.tb-meter-fill { position: absolute; left: 0; top: 0; bottom: 0; background: linear-gradient(90deg, var(--warm), var(--accent)); border-radius: 100px; }
.tb-echo {
  background: var(--warm); color: #422006; border: 0;
  padding: 8px 14px; border-radius: 100px;
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  text-decoration: none;
}
.tb-echo::before { content: "●"; color: #422006; }
.tb-user {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #a83817);
  color: #fff; font-family: var(--serif); font-weight: 700;
  font-size: 14px; display: grid; place-items: center;
  text-decoration: none;
}

/* === PANEL SYSTEM === */
.app { padding-top: 56px; position: relative; z-index: 5; }
.panel { display: none; }
.panel.active { display: block; animation: fadein .35s var(--ease); }
@keyframes fadein {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* eyebrow pill style — startsidans språk */
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 10.5px; font-weight: 700;
  letter-spacing: 1.6px; text-transform: uppercase;
  padding: 6px 14px; border-radius: 100px;
  background: rgba(15,21,37,0.7);
  border: 1px solid var(--line-strong);
  color: var(--text);
}
.pill::before { content: "●"; color: var(--accent); font-size: 10px; }
.pill.warm::before { color: var(--warm); }
.pill.muted { color: var(--text-mid); }
.pill.muted::before { color: var(--text-dim); }

/* === ECHO DRAWER === */
.scrim {
  position: fixed; inset: 56px 0 0 0; z-index: 90;
  background: rgba(10,14,26,0.55);
  backdrop-filter: blur(2px);
  opacity: 0; pointer-events: none;
  transition: opacity .3s var(--ease);
}
.scrim.on { opacity: 1; pointer-events: auto; }

.drawer {
  position: fixed; right: 0; top: 56px; bottom: 0;
  width: 420px; max-width: 100vw; z-index: 95;
  background: var(--bg-mid);
  border-left: 1px solid var(--line-strong);
  transform: translateX(100%);
  transition: transform .4s var(--ease);
  display: flex; flex-direction: column;
  box-shadow: -20px 0 60px -10px rgba(0,0,0,0.6);
}
.drawer.open { transform: translateX(0); }
.drawer-head {
  padding: 20px 24px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.drawer-eye {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  letter-spacing: 1.6px; text-transform: uppercase;
  color: var(--warm);
}
.drawer-eye::before { content: "● "; }
.drawer-meta {
  font-family: var(--mono); font-size: 9.5px;
  color: var(--text-dim); margin-top: 4px; letter-spacing: 0.6px;
}
.drawer-close {
  background: transparent; border: 0; color: var(--text-mid);
  cursor: pointer; font-size: 26px; line-height: 1;
}
.drawer-body {
  flex: 1; overflow-y: auto;
  padding: 22px 24px; display: flex; flex-direction: column; gap: 12px;
}
.msg {
  font-family: var(--serif); font-size: 14.5px; line-height: 1.5;
  padding: 12px 14px; border-radius: 6px;
}
.msg.echo {
  background: rgba(251,191,36,0.08);
  border: 1px solid rgba(251,191,36,0.18);
  font-style: italic;
}
.msg.user {
  background: rgba(255,255,255,0.06);
  align-self: flex-end; max-width: 80%;
}
.drawer-foot {
  padding: 14px 22px; border-top: 1px solid var(--line);
  display: flex; gap: 10px;
}
.drawer-foot input {
  flex: 1; background: rgba(255,255,255,0.06);
  border: 1px solid var(--line-strong);
  color: #fff; padding: 10px 14px; border-radius: 100px;
  font-family: "Inter", sans-serif; font-size: 13px;
}
.drawer-foot input::placeholder { color: var(--text-dim); }
.drawer-foot button {
  background: var(--warm); color: #422006;
  border: 0; padding: 10px 16px; border-radius: 100px;
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  cursor: pointer;
}

/* shared layout */
.shell {
  max-width: 1280px; margin: 0 auto;
  padding: 32px clamp(20px, 5vw, 60px) 80px;
}
</style>
</head>
<body>

<header class="topbar">
  <a href="/" class="tb-brand">Ekonomilabbet <span class="tb-brand-meta">Forskning · 2026</span></a>
  <div class="tb-crumbs" id="crumbs"></div>
  <div class="tb-spacer"></div>
  <div class="tb-meter" title="AI-tokens">
    <span>AI</span>
    <div class="tb-meter-bar"><div class="tb-meter-fill" style="width:38%;"></div></div>
    <span>62 % kvar</span>
  </div>
  <button class="tb-echo" id="echoBtn">Echo</button>
  <a href="#" class="tb-user">SA</a>
</header>

<main class="app">
  <!-- Panels populeras i kommande commits -->
  <section class="panel active" id="p-hub"></section>
  <section class="panel" id="p-bank"></section>
  <section class="panel" id="p-bankid"></section>
  <section class="panel" id="p-arbg"></section>
  <section class="panel" id="p-maria"></section>
  <section class="panel" id="p-avanza"></section>
  <section class="panel" id="p-skatt"></section>
  <section class="panel" id="p-modul"></section>
</main>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer"></aside>

<script>
// === Navigation core ===
const PANELS = {
  hub:    { label: "Pentagonen",            crumb: ["● HUBBEN"] },
  bank:   { label: "Banken",                crumb: ["HUBBEN", "● BANKEN"] },
  bankid: { label: "BankID-signering",      crumb: ["HUBBEN", "BANKEN", "● BANKID"] },
  arbg:   { label: "Arbetsgivaren",         crumb: ["HUBBEN", "● ARBETSGIVAREN"] },
  maria:  { label: "Lönesamtal · Maria",    crumb: ["HUBBEN", "ARBETSGIVAREN", "● MARIA"] },
  avanza: { label: "Avanza",                crumb: ["HUBBEN", "● AVANZA"] },
  skatt:  { label: "Skatteverket",          crumb: ["HUBBEN", "● SKATTEVERKET"] },
  modul:  { label: "Modul: Ditt första bolån", crumb: ["HUBBEN", "● MODUL · BOLÅN"] },
};

function go(view) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  const p = document.getElementById("p-" + view);
  if (p) p.classList.add("active");
  renderCrumbs(view);
  window.scrollTo({ top: 0, behavior: "instant" });
}
function renderCrumbs(view) {
  const meta = PANELS[view];
  if (!meta) return;
  const box = document.getElementById("crumbs");
  const parts = meta.crumb.map((c, i, arr) => {
    if (i === arr.length - 1) return `<strong>${c}</strong>`;
    return `<a onclick="go('${c.toLowerCase().includes('hubben') ? 'hub' : c.toLowerCase().replace(/[^a-z]/g,'')}'); return false;" href="#">${c}</a>`;
  });
  box.innerHTML = parts.join('<span class="sep">›</span>');
}
renderCrumbs("hub");

// Echo drawer
document.getElementById("echoBtn").addEventListener("click", () => {
  document.getElementById("drawer").classList.add("open");
  document.getElementById("scrim").classList.add("on");
});
document.getElementById("scrim").addEventListener("click", () => {
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("scrim").classList.remove("on");
});

// Globala helpers
window.go = go;
</script>
</body>
</html>
